<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新世界理发店预约小程序 </title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div>
          <p class="eyebrow">Barber Booking</p>
          <h1>新世界理发店预约小程序</h1>
          <p class="hero-copy">在线选择服务、发型师和到店时间，30 秒完成理发预约。</p>
        </div>
        <div class="hero-stat">
          <strong>4.9</strong>
          <span>顾客评分</span>
        </div>
      </section>

      <section class="layout-grid">
        <form class="booking-card" id="booking-form">
          <h2>立即预约</h2>

          <label>
            服务项目
            <div class="service-grid" id="service-grid"></div>
          </label>

          <label>
            发型师
            <select id="stylist" name="stylist"></select>
          </label>

          <div class="inline-fields">
            <label>
              到店日期
              <input id="date" name="date" type="date" />
            </label>
            <label>
              到店时间
              <select id="time" name="time"></select>
            </label>
          </div>

          <div class="inline-fields">
            <label>
              姓名
              <input id="customer-name" name="customer-name" placeholder="请输入姓名" />
            </label>
            <label>
              手机号
              <input id="phone" name="phone" placeholder="用于接收提醒" />
            </label>
          </div>

          <label>
            备注
            <textarea id="note" name="note" placeholder="例如：想保留刘海、头皮敏感等"></textarea>
          </label>

          <button class="submit-btn" id="submit-btn" type="submit">确认预约</button>
        </form>

        <aside class="summary-card">
          <h2>预约预览</h2>
          <div class="preview-box">
            <p id="preview-service"></p>
            <strong id="preview-time"></strong>
            <span id="preview-detail"></span>
          </div>

          <h3>我的预约</h3>
          <p class="empty" id="empty-state">暂无预约，提交后会显示在这里。</p>
          <ul class="appointment-list" id="appointment-list"></ul>
        </aside>
      </section>
    </main>
    <script src="src/main.js"></script>
  </body>
</html>
